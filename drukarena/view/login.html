<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DrukArena</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login-page.css">ls
</head>
<body class="login-page">

<nav class="sidebar">
  <a href="/" class="sidebar-logo"><img src="logo.png" alt="DrukArena"></a>
  <a href="/" class="nav-item"><span class="nav-icon">⌂</span>Home</a>
  <a href="/tournaments" class="nav-item"><span class="nav-icon">⚔</span>Events</a>
  <a href="/matches" class="nav-item"><span class="nav-icon">📊</span>Matches</a>
</nav>

<main class="main-content auth-main">
  <div class="form-container">

    <!-- Logo in form -->
    <div class="auth-logo-wrap">
      <img src="logo.png" alt="DrukArena" class="auth-logo">
    </div>

    <h1 class="form-title auth-title">Login</h1>
    <p class="form-subtitle auth-subtitle">Enter your credentials to access DrukArena</p>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-field">
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="password-toggle" type="button" data-password-toggle data-target="password" aria-label="Show password" aria-pressed="false"></button>
      </div>
    </div>

    <button class="btn btn-primary btn-full auth-submit" id="login-btn" onclick="login()">
      ENTER THE ARENA
    </button>

    <div class="form-footer auth-footer">
      Dont have an account? <a href="/signup" class="form-link">Sign Up Here</a>
    </div>
  </div>
</main>

<script src="js/preview.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
